<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>BellaVia - Assistente</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 20px auto; }
    #chat-output { height: 400px; overflow: auto; border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; }
    #chat-input { width: 80%; padding: 8px; }
    #chat-button, #logout-button { padding: 8px 15px; }
  .login-box { background: #f0f0f0; padding: 20px; text-align: center; margin-bottom: 10px; }
  .login-box button { display: block; width: 250px; margin: 10px auto; padding: 12px; font-size: 16px; cursor: pointer; }
  .btn-google { background: #fff; border: 1px solid #ccc; }
  .btn-facebook { background: #1877f2; color: white; border: none; }
  .card-prompt { background: #fff3cd; padding: 15px; margin: 10px 0; border-left: 4px solid #ffc107; }
  </style>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
</head>
<body>
  <div id="login-box" class="login-box">
    <h3>Bem-vindo à BellaVia!</h3>
    <p>Entre pra acessar promoções exclusivas</p>
    <button id="google-login" class="btn-google">Entrar com Google</button>
    <button id="facebook-login" class="btn-facebook">Entrar com Facebook</button>
    <div id="login-error" style="color:red; margin-top:10px;"></div>
  </div>

  <div id="card-prompt" class="card-prompt" style="display:none;">
    <b>Cartão BellaVia</b><br>
    Quer ativar seu Cartão BellaVia? 10% de desconto extra em todas as promoções!<br><br>
    <button id="ativar-card">Sim, quero meu Cartão!</button>
    <button id="pular-card">Agora não</button>
  </div>

  <div id="bellavia-chat" style="display:none;">
    <div id="chat-output"></div>
    <input id="chat-input" type="text" placeholder="Ex: quero picanha em promoção">
    <button id="chat-button">Enviar</button>
    <button id="logout-button" style="float:right;">Sair</button>
  </div>

  <script type="module" src="BellaVia.js"></script>
</body>
</html>
