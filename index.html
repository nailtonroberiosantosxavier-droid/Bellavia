<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Bellavia – Açougue, Padaria & Mercearia</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --navy:#1B3A6B; --red:#E63329; --sky:#3A9BD5;
  --bg:#F0F2F7; --card:#fff; --text:#12182B; --muted:#6E7B9A;
  --gold:#F0A500; --green:#2D8C4E; --r:16px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);padding-bottom:72px;-webkit-tap-highlight-color:transparent}

/* HEADER */
header{background:var(--navy);padding:10px 16px 0;position:sticky;top:0;z-index:50;box-shadow:0 3px 16px rgba(0,0,0,.28)}
.hdr-top{display:flex;align-items:center;gap:10px;padding-bottom:10px}
.logo-box{width:38px;height:38px;background:white;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;color:var(--navy);flex-shrink:0}
.hdr-titles{flex:1}
.hdr-name{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:20px;color:white;line-height:1}
.hdr-sub{font-size:10px;color:var(--sky);letter-spacing:2px;text-transform:uppercase;margin-top:1px}
.ifood-btn{background:var(--red);border-radius:20px;padding:6px 12px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;color:white;text-decoration:none;display:flex;align-items:center;gap:4px;flex-shrink:0}
.tabs{display:flex;border-top:1px solid rgba(255,255,255,.1);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:10px 14px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;color:rgba(255,255,255,.4);transition:color .2s;border-bottom:3px solid transparent;white-space:nowrap}
.tab span{font-size:16px}
.tab.active{color:white;border-bottom-color:var(--red)}
.panel{display:none}.panel.active{display:block}

/* DIAGRAM */
.diag-card{margin:12px;background:#12182B;border-radius:20px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.diag-top{padding:14px 16px 6px;display:flex;align-items:flex-start;justify-content:space-between}
.diag-label{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;color:white}
.diag-hint{font-size:10px;color:rgba(255,255,255,.4);letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.diag-badge{background:rgba(255,255,255,.08);border-radius:8px;padding:4px 10px;font-size:11px;font-weight:600;color:rgba(255,255,255,.5)}

/* SVG IMAGE MAP */
.img-map-wrap{position:relative;margin:0 8px 8px}
.img-map-wrap img{width:100%;height:auto;display:block;border-radius:10px}
.img-map-wrap svg{position:absolute;top:0;left:0;width:100%;height:100%}

/* Hotspot */
.hs-outer{animation:pulse 2.4s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
@keyframes pulse{0%,100%{opacity:.22;r:14px}50%{opacity:0;r:20px}}
.hs-inner{cursor:pointer;transition:opacity .15s}
.hs-inner:active{opacity:.7}

/* CHIPS */
.chips-wrap{display:flex;gap:7px;padding:4px 10px 14px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.chips-wrap::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.07);border-radius:20px;padding:5px 10px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;color:rgba(255,255,255,.55);cursor:pointer;transition:all .2s;border:1.5px solid rgba(255,255,255,.1);white-space:nowrap}
.chip.active{background:var(--red);color:white;border-color:var(--red)}
.chip-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* BOTTOM SHEET */
.overlay{position:fixed;inset:0;background:rgba(10,15,35,.65);z-index:200;opacity:0;pointer-events:none;transition:opacity .28s;backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px)}
.overlay.show{opacity:1;pointer-events:all}
.sheet{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-radius:26px 26px 0 0;padding:0 20px 36px;z-index:201;max-height:88vh;overflow-y:auto;transform:translateY(105%);transition:transform .36s cubic-bezier(.34,1.38,.64,1)}
.sheet.show{transform:translateY(0)}
.sheet-handle{width:38px;height:4px;background:#DDE3EF;border-radius:2px;margin:14px auto 16px}
.sh-head{display:flex;gap:16px;align-items:flex-start;margin-bottom:14px}
.sh-icon{width:84px;height:84px;border-radius:20px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:52px;background:var(--bg)}
.sh-right{flex:1;padding-top:2px}
.sh-name{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:28px;color:var(--navy);line-height:1;margin-bottom:3px}
.sh-type{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px}
.sh-price{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:30px;color:var(--red)}
.sh-unit{font-size:12px;color:var(--muted);margin-top:1px}
.sh-desc{font-size:13px;color:#4A5568;line-height:1.65;border-top:1px solid #EDF0F7;padding-top:12px;margin-bottom:12px}
.sh-tags{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px}
.sh-tag{background:var(--bg);border-radius:10px;padding:4px 10px;font-size:12px;font-weight:600;color:var(--navy)}
.sh-blabel{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:7px}
.sh-brands{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px}
.sh-brand{background:var(--navy);border-radius:9px;padding:5px 11px;font-size:12px;font-weight:600;color:white}
.sh-cta{display:block;text-align:center;background:var(--red);color:white;border-radius:14px;padding:14px;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:18px;letter-spacing:.5px;text-decoration:none}
.sh-cta2{display:block;text-align:center;background:var(--bg);color:var(--navy);border-radius:14px;padding:12px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;margin-top:9px;text-decoration:none}

/* PADARIA */
.pad-hero{margin:12px;border-radius:20px;background:linear-gradient(135deg,#7C3D0E,#C4692A);padding:18px;position:relative;overflow:hidden}
.pad-hero::before{content:'🥐';position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:64px;opacity:.28}
.pad-hero-label{font-size:10px;font-weight:700;color:rgba(255,255,255,.6);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:3px}
.pad-hero-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:28px;color:white;line-height:1;margin-bottom:3px}
.pad-hero-sub{font-size:12px;color:rgba(255,255,255,.7)}
.sec-head{display:flex;align-items:center;gap:8px;padding:12px 12px 6px}
.sec-icon{font-size:20px}
.sec-name{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:19px;color:var(--navy)}
.sec-line{flex:1;height:1px;background:#DDE3EF}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 12px 4px}
.pcard{background:white;border-radius:16px;padding:13px 11px 11px;position:relative;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.07);cursor:pointer;transition:transform .15s}
.pcard:active{transform:scale(.97)}
.pbar{position:absolute;top:0;left:0;right:0;height:3px}
.pem{font-size:36px;line-height:1;margin-bottom:7px;display:block}
.pname{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:15px;color:var(--navy);line-height:1.15;margin-bottom:2px}
.pbrand{font-size:10px;color:var(--muted);font-weight:600;margin-bottom:7px}
.pprice{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:21px;color:var(--red)}
.punit{font-size:10px;color:var(--muted)}
.pcard.wide{grid-column:1/-1;display:flex;gap:13px;align-items:center}
.pcard.wide .pem{font-size:48px;margin-bottom:0;flex-shrink:0}
.pcard.wide .pprice{font-size:25px}
.pbadge{position:absolute;top:10px;right:9px;background:var(--gold);border-radius:7px;padding:2px 7px;font-size:9px;font-weight:800;color:white}
.pbadge.green{background:var(--green)}

/* MERCEARIA */
.merc-hero{margin:12px;border-radius:20px;background:linear-gradient(135deg,#1B3A6B,#2D5FA0);padding:18px;position:relative;overflow:hidden}
.merc-hero::before{content:'🛒';position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:64px;opacity:.22}
.merc-hero-label{font-size:10px;font-weight:700;color:rgba(255,255,255,.6);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:3px}
.merc-hero-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:28px;color:white;line-height:1;margin-bottom:3px}
.merc-hero-sub{font-size:12px;color:rgba(255,255,255,.65)}

/* HIGIENE */
.hig-hero{margin:12px;border-radius:20px;background:linear-gradient(135deg,#0E6655,#1A9977);padding:18px;position:relative;overflow:hidden}
.hig-hero::before{content:'🧴';position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:64px;opacity:.22}
.hig-hero-label{font-size:10px;font-weight:700;color:rgba(255,255,255,.6);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:3px}
.hig-hero-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:28px;color:white;line-height:1;margin-bottom:3px}
.hig-hero-sub{font-size:12px;color:rgba(255,255,255,.65)}

/* PROMO ribbon */
.ribbon{position:absolute;top:10px;left:-2px;background:var(--red);color:white;font-size:9px;font-weight:800;letter-spacing:.5px;padding:3px 8px;border-radius:0 5px 5px 0}

.spacer{height:16px}
</style>
</head>
